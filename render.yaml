services:
  - type: web
    name: siakad
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: SIAKAD
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://siakad.onrender.com   # ← ganti dengan URL Render kamu nanti

      # Database — isi setelah buat PostgreSQL di Render dashboard
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: siakad-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: siakad-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: siakad-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: siakad-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: siakad-db
          property: password

      # Session & cache pakai database (bukan file, agar aman di cloud)
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: siakad-db
    databaseName: siakad
    user: siakad_user
    plan: free
